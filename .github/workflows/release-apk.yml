# Build the signed release APK on GitHub's runners and publish it as a GitHub
# Release, so there's a stable download link. Triggered by pushing a v* tag.
# Uses the built-in GITHUB_TOKEN (no PAT); needs the release signing secrets.
name: Release APK

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        run: echo "${{ secrets.FEEDS_RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/feeds-release.jks"

      - name: Build signed release APK
        working-directory: android
        env:
          FEEDS_RELEASE_STORE_FILE: ${{ runner.temp }}/feeds-release.jks
          FEEDS_RELEASE_STORE_PASSWORD: ${{ secrets.FEEDS_RELEASE_STORE_PASSWORD }}
          FEEDS_RELEASE_KEY_ALIAS: ${{ secrets.FEEDS_RELEASE_KEY_ALIAS }}
          FEEDS_RELEASE_KEY_PASSWORD: ${{ secrets.FEEDS_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Name the asset feeds.apk (stable latest/download link)
        run: cp android/app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/feeds.apk"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0-{0}', github.run_number) }}
        run: |
          gh release create "$TAG" "$RUNNER_TEMP/feeds.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Feeds $TAG" \
            --notes "Signed release APK. Install: open the link on the phone, allow install from your browser, tap Install." \
            || gh release upload "$TAG" "$RUNNER_TEMP/feeds.apk" --repo "$GITHUB_REPOSITORY" --clobber
