# Build the feeds server image and deploy it, mirroring meals_server's workflow.
# Builds on GitHub runners (no local Docker), pushes to grubplanner.co.uk:32000,
# then rolls the deployment so the pod re-pulls :latest.
name: Build Image

on:
  workflow_dispatch:
  push:
    branches: [ deploy-server ]
    paths:
      - 'server/**'
      - 'model/**'
      - '.github/workflows/build-image.yml'

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and push image
        working-directory: server
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: ./gradlew bootBuildImage

  # No deploy job on purpose: rolling the deployment is done with a kubeconfig
  # that has cluster access, and keeping cluster-admin creds out of CI is the
  # safer default. After this workflow pushes :latest, roll the pod with:
  #   kubectl rollout restart deployment/feeds -n default
  # (Add a deploy job with a KUBECONFIG secret later if fully hands-off CD is wanted.)
