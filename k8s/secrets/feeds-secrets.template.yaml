# Feeds secrets TEMPLATE — mirrors meals_cluster/secrets/meals-secrets.template.yaml.
#
# Meals delivers secrets as plain Kubernetes Opaque Secrets applied to the
# cluster out-of-band with kubectl (NOT synced by ArgoCD, no real values in
# git). Same mechanism here:
#
#   cp feeds-secrets.template.yaml feeds-secrets.yaml
#   # fill in base64 values:  echo -n "your-secret-value" | base64
#   kubectl apply -f feeds-secrets.yaml
#
# NEVER commit the filled-in copy — k8s/secrets/.gitignore blocks it, matching
# the meals_cluster .gitignore. This directory is deliberately NOT synced by
# the feeds ArgoCD Application (it syncs k8s/ with recurse: false).
apiVersion: v1
kind: Secret
metadata:
  name: feeds-database-secret
  namespace: default
  labels:
    app.kubernetes.io/name: feeds
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: feeds
type: Opaque
data:
  # Base64 encoded values - replace with your actual values.
  # url is host:port/db[?params] (no jdbc:postgresql:// prefix — that lives in
  # application.properties). Kept in the secret, not the manifest, so the
  # Supabase host isn't exposed in the public repo. Direct connection:
  #   db.<project-ref>.supabase.co:5432/postgres?sslmode=require
  # Pooler fallback (session mode): <region>.pooler.supabase.com:5432/postgres
  # For the Supabase pooler the username is of the form postgres.<project-ref>.
  url: <BASE64_ENCODED_DB_URL>
  username: <BASE64_ENCODED_DB_USERNAME>
  password: <BASE64_ENCODED_DB_PASSWORD>

---
apiVersion: v1
kind: Secret
metadata:
  name: feeds-app-secret
  namespace: default
  labels:
    app.kubernetes.io/name: feeds
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: feeds
type: Opaque
data:
  # Base64 of the RSA PKCS#8 private key the feeds server signs its JWTs with.
  # Persisted so restarts/deploys don't invalidate everyone's tokens. Generate:
  #   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out feeds-jwt.pem
  #   base64 -i feeds-jwt.pem            # <-- paste the one-line output below
  # Back this key up outside the repo — losing it forces a global re-login.
  private-key: <BASE64_ENCODED_RSA_PRIVATE_KEY_PKCS8>
