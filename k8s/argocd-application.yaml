# ArgoCD Application for feeds — same format as
# meals_cluster/argocd-applications/meals-app.yaml, but pointing at this
# monorepo's k8s/ directory instead of a separate cluster repo.
#
# REPO URL IS A PLACEHOLDER: deploy-patterns shows every meals Application
# carries the placeholder https://github.com/your-username/meals_cluster.git,
# so the real GitOps repo URL is not recoverable from the reference — replace
# repoURL with this repo's real remote before syncing.
#
# Apply with: kubectl apply -f k8s/argocd-application.yaml
# (or add it to the meals root app's argocd-applications/ directory if the
# app-of-apps should own it).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: feeds
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/feeds.git  # PLACEHOLDER — set to this repo's real remote
    targetRevision: HEAD
    path: k8s
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=false
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
