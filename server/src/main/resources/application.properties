spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.datasource.url=jdbc:postgresql://${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

server.servlet.context-path=/api
server.address=0.0.0.0
server.error.include-message=always

management.endpoints.web.exposure.include=health,info
# Expose the liveness/readiness health groups the k8s probes hit
# (/api/actuator/health/{liveness,readiness}).
management.endpoint.health.probes.enabled=true

oauth.google-client-id=${GOOGLE_CLIENT_ID}

# JWT Token Configuration
# Access 15 minutes; refresh 90 days with rotation so a 3am forced re-login
# effectively never happens (SPEC.md, Auth).
app.jwt.access-token-validity=900
app.jwt.refresh-token-validity=7776000
app.jwt.enable-token-rotation=true
app.jwt.issuer=com.harding.feeds
app.jwt.audience=feeds-android-app
