# Local development without a Postgres instance: in-memory H2.
# Run with: SPRING_PROFILES_ACTIVE=localdev ./gradlew bootRun
spring.datasource.url=jdbc:h2:mem:feeds;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

oauth.google-client-id=${GOOGLE_CLIENT_ID:localdev-client-id}
